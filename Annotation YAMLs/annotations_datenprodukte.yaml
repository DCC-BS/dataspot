    i14y_dataset_version:
      label: Version
      baseType: STRING
      group: I14Y
      title: Tragen Sie hier die Versionsnummer Ihres Datensatzes ein. Bei Neueröffnung eines Eintrags wird die Versionsnummer 1.0.0 eingetragen. Bei kleineren Änderungen am Eintrag wird zur Versionsnummer 1.0.1 übergegangen. Bei relevanten inhaltlichen Änderungen wird zur Versionsnummer 1.1.0 genutzt übergegangen usw. Sollte der eingetragene Datensatz von einem neuen Datensatz abgelöst werden, wird die Versionsnummer 2.0.0 verwendet. Bitte beachten Sie, dass beim Erstellen einer neuen Version eines Eintrags die alte Version auf den Status “Abgelöst” gesetzt werden muss. Ansonsten ist es den Nutzerinnen und Nutzern der Plattform unmöglich, auf Anhieb die aktuelle Version des Eintrags zu finden. Dieses Feld ist in DCAT-AP CH 3.0 vorgesehen.
    i14y_dataset_versionNotes:
