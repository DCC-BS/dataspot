# Datenprodukte

DataCatalog:
  label: Datenproduktekatalog

SubDataset:
  label: Subdatenprodukt
  plural: Subdatenprodukte
  gender: n

Dataset:
  label: Datenprodukt
  plural: Datenprodukte
  gender: n

  groups:
    GEO:
      label: Geodaten
      order: 50
      icon: location-dot
    OGD:
      label: OGD
      order: 60
      icon: globe
    I14Y:
      label: I14Y
      title: Metadaten, welche explizit für die Veröffentlichung auf i14y.admin.ch erfasst werden können
      order: 70
      icon: folder-plus

  properties:
    label:
      label: Name
      title: Name des Datenprodukts
    title:
      label: Kurzbeschreibung
      title: Kurzbeschreibung des Datenprodukts. Diese wird in der Übersicht angezeigt und unterstützt die Auffindbarkeit, denn die Suchfunktion sucht auch in diesem Metadatenfeld.
    tags:
      label: Schlüsselwörter
      title: Schlüsselwörter, die den Inhalt beschreiben (können für die Suche genutzt werden) (GEMET, Weitere)
    accrualPeriodicity:
      label: Aktualisierungszyklus
      title: Frequenz der Aktualisierung der Attribute im Datenprodukt
      cardinality: ONE
      literals:
        http://publications.europa.eu/resource/authority/frequency/CONT:
          label: kontinuierlich
          title: Daten werden ohne Unterbrechung laufend aktualisiert
          order: 1
        http://publications.europa.eu/resource/authority/frequency/UPDATE_CONT:
          label: ständige Aktualisierung
          title: Daten werden kontinuierlich nachgeführt, sobald Änderungen verfügbar sind
          order: 2
