# Datenbankobjekte

UmlModel:
  label: Datenobjektverzeichnis

UmlAttribute:
  properties:
    identifying:
      label: Primärschlüssel
      title: Das Kennzeichen, das angibt, ob dieses Attribut Teil eines Primärschlüssels ist. Der Primärschlüssel ist ein Attribut oder eine Kombination von Attributen eines Datenobjekts, das jeden Eintrag eindeutig identifiziert.
      baseType: BOOLEAN
  customProperties:
    primaryCollection:
      label: Primärerhebung
      title: Dieses Attribut enthält Daten aus eigener Erhebung.
      literals:
        yes:
          label: Ja
          order: 1
        no:
          label: Nein
          order: 2

UmlClass:
  properties:
    stereotype:
      label: Typ
      literals:

        file:
          label: Datei
          labelEn: file
          order: 1
          customProperties:
            fileFormat:
              label: Dateiformat
              labelEn: file format
              literals:
                csv:
                  label: csv
                  order: 10
                json:
                  label: json
                  order: 20
                pdf:
                  label: pdf
                  order: 30
                shape:
                  label: shape
                  order: 40
                xls:
                  label: xls
                  order: 50
                xlsx:
                  label: xlsx
                  order: 60
                xml:
                  label: xml
                  order: 70

        ogd_dataset_manual:
          label: OGD-Datensatz
          labelEn: OGD dataset
          order: 50
          customProperties:
            odsDataportalLink:
              label: Datenportal-Link
              baseType: STRING
              order: 50
              readOnly: true
            odsDataportalId:
              label: Datenportal-Identifikation
              baseType: STRING
              order: 60
              readOnly: true

        ogd_dataset:
          label: OGD-Datensatz (automatisch generiert)
          labelEn: OGD dataset (automatically generated)
          order: 51
          customProperties:
            odsDataportalLink:
              label: Datenportal-Link
              baseType: STRING
              order: 50
              readOnly: true
            odsDataportalId:
              label: Datenportal-Identifikation
              baseType: STRING
              order: 60
              readOnly: true